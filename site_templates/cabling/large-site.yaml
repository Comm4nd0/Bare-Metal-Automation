---
# Bare Metal Automation — Large Site Cabling Rules
# 48 cables | matches large-site template v1.0
#
# HA topology notes:
#   - sw-core-01 and sw-core-02 form a VSS/StackWise Virtual pair
#   - fw-perim-01 and fw-perim-02 form an FTD HA pair
#   - Each dist switch has a single uplink to sw-core-01 (primary)
#   - Access switch is dual-homed to both cores

cables:

  # ── Core-to-FW mesh (4 cables) ───────────────────────────────────────────
  - description: "Core-01 to FW-01 — primary path"
    a: {device: sw-core-01, interface: "Te1/0/48"}
    b: {device: fw-perim-01, interface: "Gi0/0"}
    type: cat6a
    color: yellow

  - description: "Core-01 to FW-02 — cross-connect"
    a: {device: sw-core-01, interface: "Te1/0/47"}
    b: {device: fw-perim-02, interface: "Gi0/0"}
    type: cat6a
    color: yellow

  - description: "Core-02 to FW-01 — cross-connect"
    a: {device: sw-core-02, interface: "Te1/0/48"}
    b: {device: fw-perim-01, interface: "Gi0/1"}
    type: cat6a
    color: yellow

  - description: "Core-02 to FW-02 — primary path"
    a: {device: sw-core-02, interface: "Te1/0/47"}
    b: {device: fw-perim-02, interface: "Gi0/1"}
    type: cat6a
    color: yellow

  # ── HA heartbeat links (2 cables) ────────────────────────────────────────
  - description: "Core HA heartbeat (VSS/StackWise Virtual)"
    a: {device: sw-core-01, interface: "Te1/0/46"}
    b: {device: sw-core-02, interface: "Te1/0/46"}
    type: dac-active
    color: gray

  - description: "FW HA heartbeat (VLAN 999)"
    a: {device: fw-perim-01, interface: "Gi0/2"}
    b: {device: fw-perim-02, interface: "Gi0/2"}
    type: cat6a
    color: gray

  # ── Core-to-Access (2 cables, dual-homed) ────────────────────────────────
  - description: "Core-01 to Access — uplink"
    a: {device: sw-core-01,   interface: "Te1/0/45"}
    b: {device: sw-access-01, interface: "Gi1/0/47"}
    type: cat6a
    color: blue

  - description: "Core-02 to Access — uplink (redundant)"
    a: {device: sw-core-02,   interface: "Te1/0/45"}
    b: {device: sw-access-01, interface: "Gi1/0/48"}
    type: cat6a
    color: blue

  # ── Core-01 to Distribution switches (10 cables) ─────────────────────────
  - description: "Core-01 to Dist-01"
    a: {device: sw-core-01, interface: "Te1/0/1"}
    b: {device: sw-dist-01, interface: "Te1/1/1"}
    type: cat6a
    color: blue

  - description: "Core-01 to Dist-02"
    a: {device: sw-core-01, interface: "Te1/0/2"}
    b: {device: sw-dist-02, interface: "Te1/1/1"}
    type: cat6a
    color: blue

  - description: "Core-01 to Dist-03"
    a: {device: sw-core-01, interface: "Te1/0/3"}
    b: {device: sw-dist-03, interface: "Te1/1/1"}
    type: cat6a
    color: blue

  - description: "Core-01 to Dist-04"
    a: {device: sw-core-01, interface: "Te1/0/4"}
    b: {device: sw-dist-04, interface: "Te1/1/1"}
    type: cat6a
