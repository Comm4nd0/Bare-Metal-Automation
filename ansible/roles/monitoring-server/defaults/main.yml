---
prometheus_version: "2.51.0"
grafana_version: "10.4.0"
snmp_exporter_version: "0.26.0"
prometheus_data_dir: "/var/lib/prometheus"
prometheus_retention: "30d"
prometheus_port: 9090
grafana_port: 3000
grafana_admin_password: "{{ vault_grafana_admin_password }}"
snmp_communities:
  - name: "monitoring"
    community: "{{ vault_snmp_community }}"
alertmanager_smtp_host: "smtp.{{ domain_name }}:25"
alertmanager_smtp_from: "alerts@{{ domain_name }}"
alertmanager_receivers:
  - name: "ops-team"
    email: "ops@{{ domain_name }}"
domain_name: "corp.local"
